version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-Asia/Shanghai}
    image: reblock:local
    container_name: reblock-app
    restart: unless-stopped
    ports:
      - "${APP_PORT_BIND:-3900}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_HOSTNAME: ${MONGO_HOSTNAME}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      STORAGE_TEMP_DIR: /app/storage/_temp
      STORAGE_BLOCK_DIR: /app/storage/blocks
      STORAGE_LOG_DIR: /app/storage/_logs
      CLEANUP_DEFAULT_DAYS: ${CLEANUP_DEFAULT_DAYS:-30}
      LOG_TTL_DAYS: ${LOG_TTL_DAYS:-90}
      TZ: ${TZ:-Asia/Shanghai}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - reblock_storage_prod:/app/storage
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - reblock-shared-net

volumes:
  reblock_storage_prod:
    name: reblock_storage_prod

networks:
  reblock-shared-net:
    external: true
