version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: reblock-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: reblock
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reblock-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-Asia/Shanghai}
    container_name: reblock-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_HOSTNAME: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: reblock
      STORAGE_TEMP_DIR: /app/storage/_temp
      STORAGE_BLOCK_DIR: /app/storage/blocks
      STORAGE_LOG_DIR: /app/storage/_logs
      CLEANUP_DEFAULT_DAYS: 30
      LOG_TTL_DAYS: 90
      TZ: ${TZ:-Asia/Shanghai}
      # ENCRYPTION_KEY must be set - generate with: openssl rand -base64 32
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    volumes:
      - reblock_storage:/app/storage
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - reblock-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  reblock_storage:
    driver: local

networks:
  reblock-network:
    driver: bridge

# Usage:
# 1. Create .env file with ENCRYPTION_KEY (and optional TZ)
#    echo "ENCRYPTION_KEY=$(openssl rand -base64 32)" > .env
#    echo "TZ=Asia/Shanghai" >> .env
#
# 2. Start services:
#    docker-compose up -d
#
# 3. View logs:
#    docker-compose logs -f app
#
# 4. Stop services:
#    docker-compose down
#
# 5. Stop services and remove volumes:
#    docker-compose down -v
